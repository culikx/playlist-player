<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlist Player</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  body { background: #0f0f0f; color: #fff; }
 .player-wrapper {
    background: #1a1a1a;
    border-radius: 16px;
    padding: 20px;
  }
 .ratio-16x9 { border-radius: 12px; overflow: hidden; }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: #ff0000; border-radius: 50%;
  }

 .controls {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; margin-top: 20px;
  }
 .controls button {
    background: transparent; border: none; color: #fff;
    font-size: 28px; padding: 8px;
  }
 .play-btn {
    width: 60px; height: 60px;
    background: #ff0000;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px!important;
  }

 .load-box input {
    background: #222;
    border: 1px solid #333;
    color: #fff;
  }

 .playlist {
    margin-top: 16px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
 .playlist.show { max-height: 400px; overflow-y: auto; }
 .playlist-item {
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 14px;
  }
 .playlist-item:hover { background: rgba(255,255,255,0.08); }
 .playlist-item.active { background: rgba(255,0,0,0.2); }
 .playlist-item img { width: 80px; height: 45px; border-radius: 4px; object-fit: cover; }
 .playlist-item .meta { flex: 1; }
 .playlist-item small { opacity: 0.7; }
</style>
</head>
<body>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-9">

      <div class="load-box d-flex gap-2 mb-3">
        <input type="text" id="playlistInput" class="form-control"
          placeholder="Paste link playlist atau ID PL...">
        <button id="loadBtn" class="btn btn-danger">Load</button>
      </div>

      <div class="player-wrapper">
        <div class="ratio ratio-16x9 mb-3">
          <div id="player"></div>
        </div>

        <div class="d-flex align-items-center gap-3">
          <span id="currentTime">00:00</span>
          <input type="range" id="seek" min="0" max="100" value="0">
          <span id="duration">00:00</span>
        </div>

        <div class="controls">
          <button id="repeat"><i class="bi bi-arrow-repeat"></i></button>
          <button id="prev"><i class="bi bi-skip-backward-fill"></i></button>
          <button id="playPause" class="play-btn"><i class="bi bi-play-fill"></i></button>
          <button id="next"><i class="bi bi-skip-forward-fill"></i></button>
          <button id="playlistBtn"><i class="bi bi-list"></i></button>
        </div>

        <h6 id="videoTitle" class="mt-3 text-center"></h6>

        <div class="playlist" id="playlist">
          <div id="playlistItems" class="text-center text-secondary">Loading playlist...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let player, playlistData = [], currentIndex = 0;
  let isPlaying = false, isLoop = false;
  const DEFAULT_PLAYLIST = 'PL0wqt_um4x0bsdViTJBmnl6KGMoSqxfZy';

  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  function onYouTubeIframeAPIReady() {
    loadPlaylist(DEFAULT_PLAYLIST);
  }

  async function loadPlaylist(input) {
    const playlistId = extractPlaylistId(input);
    if (!playlistId.startsWith('PL')) {
      alert('Playlist ID salah. Harus mulai dengan PL');
      return;
    }

    document.getElementById('playlistInput').value = playlistId;
    document.getElementById('playlistItems').innerHTML = 'Loading judul video...';

    try {
      // Ambil data playlist + judul pakai Invidious
      const res = await fetch(`https://invidious.io/api/v1/playlists/${playlistId}`);
      if (!res.ok) throw new Error('Gagal load playlist');
      
      const data = await res.json();
      playlistData = data.videos.map(v => ({
        id: v.videoId,
        title: v.title,
        channel: v.author,
        duration: v.lengthSeconds
      }));

      // Buat player
      if (player) player.destroy();
      player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: playlistData[0].id,
        playerVars: {
          controls: 0,
          rel: 0,
          modestbranding: 1,
          enablejsapi: 1
        },
        events: {
          'onReady': onPlayerReady,
          'onStateChange': onPlayerStateChange
        }
      });

      buildPlaylistUI();

    } catch (e) {
      console.error(e);
      document.getElementById('playlistItems').innerHTML = 'Gagal load. Pastikan playlist public';
    }
  }

  function onPlayerReady() {
    updateVideoInfo();
    setInterval(updateProgress, 500);
  }

  function onPlayerStateChange(e) {
    isPlaying = e.data === YT.PlayerState.PLAYING;
    document.getElementById('playPause').innerHTML =
      isPlaying? '<i class="bi bi-pause-fill"></i>' : '<i class="bi bi-play-fill"></i>';

    if (isPlaying) {
      updateVideoInfo();
    }

    if (e.data === YT.PlayerState.ENDED && !isLoop) {
      nextVideo();
    }
  }

  function buildPlaylistUI() {
    const container = document.getElementById('playlistItems');
    container.innerHTML = '';
    
    playlistData.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'playlist-item';
      div.innerHTML = `
        <img src="https://i.ytimg.com/vi/${item.id}/mqdefault.jpg" alt="">
        <div class="meta">
          <div>${item.title}</div>
          <small>${item.channel} • ${formatTime(item.duration)}</small>
        </div>
      `;
      div.onclick = () => loadVideo(i);
      container.appendChild(div);
    });

    updateActivePlaylistItem();
  }

  function updateVideoInfo() {
    const item = playlistData[currentIndex];
    document.getElementById('videoTitle').textContent = item.title;
    document.getElementById('duration').textContent = formatTime(player.getDuration());
    document.getElementById('seek').max = player.getDuration();
    updateActivePlaylistItem();
  }

  function loadVideo(index) {
    currentIndex = index;
    player.loadVideoById(playlistData[index].id);
  }

  function nextVideo() {
    currentIndex = (currentIndex + 1) % playlistData.length;
    loadVideo(currentIndex);
  }

  function prevVideo() {
    currentIndex = (currentIndex - 1 + playlistData.length) % playlistData.length;
    loadVideo(currentIndex);
  }

  function updateActivePlaylistItem() {
    document.querySelectorAll('.playlist-item').forEach((el, i) => {
      el.classList.toggle('active', i === currentIndex);
    });
  }

  function extractPlaylistId(input) {
    const match = input.match(/[?&]list=([a-zA-Z0-9_-]+)/);
    return match? match[1] : input.trim();
  }

  // Controls
  document.getElementById('loadBtn').onclick = () => {
    loadPlaylist(document.getElementById('playlistInput').value);
  };

  document.getElementById('playlistInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('loadBtn').click();
  });

  document.getElementById('playPause').onclick = () => {
    if (!player) return;
    isPlaying? player.pauseVideo() : player.playVideo();
  };

  document.getElementById('repeat').onclick = () => {
    isLoop =!isLoop;
    document.getElementById('repeat').style.opacity = isLoop? '1' : '0.5';
  };

  document.getElementById('prev').onclick = prevVideo;
  document.getElementById('next').onclick = nextVideo;

  document.getElementById('playlistBtn').onclick = () => {
    document.getElementById('playlist').classList.toggle('show');
  };

  document.getElementById('seek').oninput = (e) => {
    if (player) player.seekTo(e.target.value, true);
  };

  function updateProgress() {
    if (player && player.getCurrentTime) {
      const time = player.getCurrentTime();
      document.getElementById('currentTime').textContent = formatTime(time);
      document.getElementById('seek').value = time;
    }
  }

  function formatTime(sec) {
    sec = Math.floor(sec || 0);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }

  // Auto load dari URL param
  const urlList = new URLSearchParams(window.location.search).get('list');
  if (urlList) {
    document.getElementById('playlistInput').value = urlList;
  }
</script>
</body>
</html>
