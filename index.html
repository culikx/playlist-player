<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Playlist Player</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  body { background: #0f0f0f; color: #fff; }
 .player-wrapper {
    background: #7a0f1c;
    border-radius: 16px;
    padding: 24px 20px;
  }
 .ratio-16x9 { border-radius: 12px; overflow: hidden; }
 .load-box input {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
  }
 .load-box input::placeholder { color: rgba(255,255,255,0.5); }
 .playlist {
    margin-top: 16px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
 .playlist.show { max-height: 350px; overflow-y: auto; }
 .playlist-item {
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 14px;
  }
 .playlist-item:hover { background: rgba(255,255,255,0.1); }
 .playlist-item.active { background: rgba(255,255,255,0.2); }
 .playlist-item img { width: 80px; height: 45px; border-radius: 4px; object-fit: cover; }
</style>
</head>
<body>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-9">

      <div class="load-box d-flex gap-2 mb-3">
        <input type="text" id="playlistInput" class="form-control"
          placeholder="Paste link playlist atau ID PL...">
        <button id="loadBtn" class="btn btn-danger">Load</button>
      </div>

      <div class="player-wrapper">
        <div class="ratio ratio-16x9 mb-3">
          <iframe id="player"
            src=""
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen>
          </iframe>
        </div>

        <h6 id="videoTitle" class="mt-3 text-center">Pilih playlist dulu</h6>

        <div class="playlist" id="playlist">
          <div id="playlistItems" class="text-center text-secondary">Playlist akan muncul di sini</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let playlistId = '';

  function extractPlaylistId(input) {
    const match = input.match(/[?&]list=([a-zA-Z0-9_-]+)/);
    return match? match[1] : input.trim();
  }

  function loadPlaylist(input) {
    playlistId = extractPlaylistId(input);

    if (!playlistId.startsWith('PL')) {
      alert('ID playlist salah. Harus mulai dengan PL');
      return;
    }

    // Load iframe dengan playlist
    const iframe = document.getElementById('player');
    iframe.src = `https://www.youtube-nocookie.com/embed/videoseries?list=${playlistId}&enablejsapi=1&modestbranding=1&rel=0`;

    // Ambil data playlist pakai YouTube oEmbed API
    fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/playlist?list=${playlistId}&format=json`)
     .then(res => res.json())
     .then(data => {
        document.getElementById('videoTitle').textContent = data.title;

        // Buat list dummy dari jumlah video di judul
        // Karena oEmbed nggak kasih list video, kita ambil dari title "Playlist: 20 videos"
        const match = data.title.match(/\((\d+)\svideos?\)/);
        const count = match? parseInt(match[1]) : 0;

        document.getElementById('playlistItems').innerHTML = `
          <div class="text-center p-3">
            <strong>${data.title}</strong><br>
            <small>${count} videos</small><br>
            <small class="text-secondary">Klik tombol ≡ di player YouTube untuk lihat daftar video</small>
          </div>
        `;

        document.getElementById('playlist').classList.add('show');
      })
     .catch(() => {
        document.getElementById('playlistItems').innerHTML = 'Playlist public atau unlisted';
        document.getElementById('playlist').classList.add('show');
      });
  }

  document.getElementById('loadBtn').onclick = () => {
    const val = document.getElementById('playlistInput').value;
    loadPlaylist(val);
  };

  document.getElementById('playlistInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('loadBtn').click();
  });

  // Auto load kalau ada?list= di URL
  const urlList = new URLSearchParams(window.location.search).get('list');
  if (urlList) {
    document.getElementById('playlistInput').value = urlList;
    loadPlaylist(urlList);
  }
</script>
</body>
</html>
