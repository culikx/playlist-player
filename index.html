<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlist Player</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  body { background: #0f0f0f; color: #fff; }
.player-wrapper { background: #1a1a1a; border-radius: 16px; padding: 20px; }
.ratio-16x9 { border-radius: 12px; overflow: hidden; }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: #ff0000; border-radius: 50%;
  }

.controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 20px; }
.controls button { background: transparent; border: none; color: #fff; font-size: 28px; padding: 8px; }
.play-btn {
    width: 60px; height: 60px;
    background: #ff0000; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px!important;
  }

.load-box input { background: #222; border: 1px solid #333; color: #fff; }
.load-box input::placeholder { color: #666; }

.playlist {
    margin-top: 16px;
    max-height: 0;
    overflow-y: auto;
    transition: max-height 0.4s ease;
    scroll-behavior: smooth;
  }
.playlist.show { max-height: 400px; }

 /* Scrollbar custom */
.playlist::-webkit-scrollbar { width: 6px; }
.playlist::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
.playlist::-webkit-scrollbar-track { background: #1a1a1a; }

.playlist-item {
    padding: 12px 10px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 14px;
    text-align: left;
  }
.playlist-item:hover { background: rgba(255,255,255,0.08); }
.playlist-item.active { background: rgba(255,0,0,0.2); }

.playlist-item img {
    width: 80px;
    height: 45px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
  }

.playlist-item.meta {
    flex: 1;
    min-width: 0;
    text-align: left;
  }

.playlist-item.title {
    font-weight: 500;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-align: left;
  }

.playlist-item small {
    opacity: 0.6;
    font-size: 12px;
    text-align: left;
    display: block;
    margin-top: 4px;
  }

.playlist-number {
    color: #888;
    font-size: 13px;
    min-width: 24px;
    text-align: right;
  }

.playlist-item.active.playlist-number {
    color: #ff0000;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-9">

      <div class="load-box d-flex gap-2 mb-3">
        <input type="text" id="playlistInput" class="form-control"
          placeholder="Paste link playlist atau ID PL..." value="PL0wqt_um4x0bsdViTJBmnl6KGMoSqxfZy">
        <button id="loadBtn" class="btn btn-danger">Load</button>
      </div>

      <div class="player-wrapper">
        <div class="ratio ratio-16x9 mb-3">
          <div id="player"></div>
        </div>

        <div class="d-flex align-items-center gap-3">
          <span id="currentTime">00:00</span>
          <input type="range" id="seek" min="0" max="100" value="0">
          <span id="duration">00:00</span>
        </div>

        <div class="controls">
          <button id="repeat" title="Repeat"><i class="bi bi-arrow-repeat"></i></button>
          <button id="prev" title="Previous"><i class="bi bi-skip-backward-fill"></i></button>
          <button id="playPause" class="play-btn"><i class="bi bi-play-fill"></i></button>
          <button id="next" title="Next"><i class="bi bi-skip-forward-fill"></i></button>
          <button id="playlistBtn" title="Playlist"><i class="bi bi-list"></i></button>
        </div>

        <h6 id="videoTitle" class="mt-3 text-center">Loading...</h6>

        <div class="playlist" id="playlist">
          <div id="playlistItems" class="text-center text-secondary py-3">Loading playlist...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let player, playlistIds = [], playlistData = [], currentIndex = 0;
  let isPlaying = false, isLoop = false;
  const DEFAULT_PLAYLIST = 'PL0wqt_um4x0bsdViTJBmnl6KGMoSqxfZy';

  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function() {
    loadPlaylist(DEFAULT_PLAYLIST);
  }

  function loadPlaylist(input) {
    const playlistId = extractPlaylistId(input);
    if (!playlistId.startsWith('PL')) {
      alert('Playlist ID salah. Harus mulai dengan PL');
      return;
    }

    document.getElementById('playlistInput').value = playlistId;
    document.getElementById('playlistItems').innerHTML = 'Loading playlist...';
    document.getElementById('playlist').classList.add('show');

    if (player) player.destroy();

    player = new YT.Player('player', {
      height: '100%',
      width: '100%',
      playerVars: {
        listType: 'playlist',
        list: playlistId,
        controls: 0,
        rel: 0,
        modestbranding: 1,
        enablejsapi: 1,
        origin: window.location.origin
      },
      events: {
        'onReady': onPlayerReady,
        'onStateChange': onPlayerStateChange,
        'onError': onPlayerError
      }
    });
  }

  function onPlayerReady() {
    setTimeout(() => {
      playlistIds = player.getPlaylist() || [];
      currentIndex = player.getPlaylistIndex() || 0;

      if (playlistIds.length === 0) {
        document.getElementById('playlistItems').innerHTML = 'Playlist kosong atau private';
        return;
      }

      fetchTitles(playlistIds);
      updateVideoInfo();
      setInterval(updateProgress, 500);
    }, 800);
  }

  async function fetchTitles(ids) {
    playlistData = [];
    document.getElementById('playlistItems').innerHTML = 'Mengambil judul video...';

    for (let i = 0; i < ids.length; i++) {
      try {
        const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${ids[i]}`);
        const data = await res.json();
        playlistData.push({
          id: ids[i],
          title: data.title || `Video ${i+1}`,
          author: data.author_name || ''
        });
      } catch (e) {
        playlistData.push({ id: ids[i], title: `Video ${i+1}`, author: '' });
      }

      if (i % 3 === 0 || i === ids.length - 1) {
        buildPlaylistUI();
      }
    }
  }

  function onPlayerStateChange(e) {
    isPlaying = e.data === YT.PlayerState.PLAYING;
    document.getElementById('playPause').innerHTML =
      isPlaying? '<i class="bi bi-pause-fill"></i>' : '<i class="bi bi-play-fill"></i>';

    currentIndex = player.getPlaylistIndex();

    if (isPlaying) {
      updateVideoInfo();
      scrollToActiveItem(); // Auto scroll ke item aktif
    }

    if (e.data === YT.PlayerState.ENDED) {
      if (isLoop) {
        player.seekTo(0);
        player.playVideo();
      } else {
        nextVideo();
      }
    }
  }

  function onPlayerError(e) {
    console.error('YouTube Error:', e.data);
  }

  function buildPlaylistUI() {
    const container = document.getElementById('playlistItems');
    if (playlistData.length === 0) return;

    container.innerHTML = '';
    playlistData.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'playlist-item';
      div.dataset.index = i;
      div.innerHTML = `
        <div class="playlist-number">${i + 1}</div>
        <img src="https://i.ytimg.com/vi/${item.id}/mqdefault.jpg" onerror="this.src='https://i.ytimg.com/vi/${item.id}/hqdefault.jpg'">
        <div class="meta">
          <div class="title">${item.title}</div>
          <small>${item.author}</small>
        </div>
      `;
      div.onclick = () => loadVideo(i);
      container.appendChild(div);
    });

    updateActivePlaylistItem();
  }

  function updateVideoInfo() {
    if (!playlistData[currentIndex]) return;

    const item = playlistData[currentIndex];
    document.getElementById('videoTitle').textContent = item.title;
    document.getElementById('duration').textContent = formatTime(player.getDuration());
    document.getElementById('seek').max = player.getDuration() || 100;
    updateActivePlaylistItem();
  }

  function loadVideo(index) {
    currentIndex = index;
    player.playVideoAt(index);
  }

  function nextVideo() {
    player.nextVideo();
  }

  function prevVideo() {
    player.previousVideo();
  }

  function updateActivePlaylistItem() {
    document.querySelectorAll('.playlist-item').forEach((el, i) => {
      el.classList.toggle('active', i === currentIndex);
    });
  }

  function scrollToActiveItem() {
    const activeItem = document.querySelector(`.playlist-item[data-index="${currentIndex}"]`);
    if (activeItem) {
      activeItem.scrollIntoView({
        behavior: 'smooth',
        block: 'nearest',
        inline: 'nearest'
      });
    }
  }

  function extractPlaylistId(input) {
    const match = input.match(/[?&]list=([a-zA-Z0-9_-]+)/);
    return match? match[1] : input.trim();
  }

  // Controls
  document.getElementById('loadBtn').onclick = () => {
    loadPlaylist(document.getElementById('playlistInput').value);
  };

  document.getElementById('playlistInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('loadBtn').click();
  });

  document.getElementById('playPause').onclick = () => {
    if (!player) return;
    isPlaying? player.pauseVideo() : player.playVideo();
  };

  document.getElementById('repeat').onclick = () => {
    isLoop =!isLoop;
    document.getElementById('repeat').style.opacity = isLoop? '1' : '0.5';
  };

  document.getElementById('prev').onclick = prevVideo;
  document.getElementById('next').onclick = nextVideo;

  document.getElementById('playlistBtn').onclick = () => {
    document.getElementById('playlist').classList.toggle('show');
    if (document.getElementById('playlist').classList.contains('show')) {
      setTimeout(scrollToActiveItem, 400);
    }
  };

  document.getElementById('seek').oninput = (e) => {
    if (player) player.seekTo(e.target.value, true);
  };

  function updateProgress() {
    if (player && player.getCurrentTime) {
      const time = player.getCurrentTime();
      const duration = player.getDuration();
      document.getElementById('currentTime').textContent = formatTime(time);
      document.getElementById('seek').value = time;
      if (duration > 0) document.getElementById('seek').max = duration;
    }
  }

  function formatTime(sec) {
    sec = Math.floor(sec || 0);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }
</script>
</body>
</html>
