<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Playlist Player</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  body { background: #0f0f0f; color: #fff; }
 .player-wrapper {
    background: #7a0f1c;
    border-radius: 16px;
    padding: 24px 20px;
  }
 .ratio-16x9 { border-radius: 12px; overflow: hidden; }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: #fff; border-radius: 50%;
  }
 .controls {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 20px;
  }
 .controls button {
    background: transparent; border: none; color: #fff;
    font-size: 24px; padding: 8px;
  }
 .play-btn {
    width: 64px; height: 64px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px!important;
  }
 .playlist {
    margin-top: 16px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
 .playlist.show { max-height: 350px; overflow-y: auto; }
 .playlist-item {
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 14px;
  }
 .playlist-item:hover { background: rgba(255,255,255,0.1); }
 .playlist-item.active { background: rgba(255,255,255,0.2); }
 .playlist-item img { width: 80px; height: 45px; border-radius: 4px; object-fit: cover; }
 .playlist-item.meta { flex: 1; }
 .playlist-item small { opacity: 0.7; }
</style>
</head>
<body>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      <div class="player-wrapper" id="playerWrapper">
        <div class="ratio ratio-16x9 mb-3">
          <div id="player"></div>
        </div>

        <div class="d-flex align-items-center gap-3">
          <span id="currentTime">00:00</span>
          <input type="range" id="seek" min="0" max="100" value="0">
          <span id="duration">00:00</span>
        </div>

        <div class="controls">
          <button id="repeat"><i class="bi bi-arrow-repeat"></i></button>
          <button id="prev"><i class="bi bi-skip-backward-fill"></i></button>
          <button id="playPause" class="play-btn"><i class="bi bi-play-fill"></i></button>
          <button id="next"><i class="bi bi-skip-forward-fill"></i></button>
          <button id="playlistBtn"><i class="bi bi-list"></i></button>
        </div>

        <h6 id="videoTitle" class="mt-3 text-center"></h6>
        <div class="playlist" id="playlist">
          <div id="playlistItems" class="text-center text-secondary">Loading playlist...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const playlistId = new URLSearchParams(window.location.search).get('list');
  let playlistItems = [];
  let currentIndex = 0;
  let player, isPlaying = false, isLoop = false;

  // Load YouTube API
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  async function loadPlaylist() {
    if (!playlistId) {
      document.getElementById('playlistItems').innerHTML = 'Tambahkan?list=PL... di URL';
      return;
    }

    try {
      // Pakai Invidious API - gratis, no CORS, no key
      const res = await fetch(`https://invidious.io/api/v1/playlists/${playlistId}`);
      if (!res.ok) throw new Error('Playlist not found');

      const data = await res.json();

      playlistItems = data.videos.map(v => ({
        id: v.videoId,
        title: v.title,
        channel: v.author,
        thumb: `https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg`
      }));

      if (playlistItems.length === 0) {
        document.getElementById('playlistItems').innerHTML = 'Playlist kosong atau private';
        return;
      }

      buildPlaylistUI();
      onYouTubeIframeAPIReady();
    } catch (e) {
      console.error(e);
      document.getElementById('playlistItems').innerHTML =
        'Gagal load playlist. Pastikan playlist public dan ID benar';
    }
  }

  function onYouTubeIframeAPIReady() {
    if (!playlistItems.length) return;

    player = new YT.Player('player', {
      videoId: playlistItems[0].id,
      playerVars: { controls: 0, rel: 0, modestbranding: 1, enablejsapi: 1 },
      events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
    });
  }

  function onPlayerReady() {
    updateVideoInfo();
    setInterval(updateProgress, 500);
  }

  function onPlayerStateChange(e) {
    isPlaying = e.data === YT.PlayerState.PLAYING;
    document.getElementById('playPause').innerHTML =
      isPlaying? '<i class="bi bi-pause-fill"></i>' : '<i class="bi bi-play-fill"></i>';

    if (isPlaying) document.title = playlistItems[currentIndex].title;

    if (e.data === YT.PlayerState.ENDED) {
      if (isLoop) {
        player.seekTo(0);
        player.playVideo();
      } else {
        nextVideo();
      }
    }
  }

  function updateVideoInfo() {
    const item = playlistItems[currentIndex];
    document.getElementById('videoTitle').textContent = item.title;
    document.getElementById('duration').textContent = formatTime(player.getDuration());
    document.getElementById('seek').max = player.getDuration();
    updateActivePlaylistItem();
  }

  function loadVideo(index) {
    currentIndex = index;
    player.loadVideoById(playlistItems[index].id);
    updateVideoInfo();
  }

  function nextVideo() {
    currentIndex = (currentIndex + 1) % playlistItems.length;
    loadVideo(currentIndex);
  }

  function prevVideo() {
    currentIndex = (currentIndex - 1 + playlistItems.length) % playlistItems.length;
    loadVideo(currentIndex);
  }

  function buildPlaylistUI() {
    const container = document.getElementById('playlistItems');
    container.innerHTML = '';
    playlistItems.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'playlist-item';
      div.innerHTML = `
        <img src="${item.thumb}" alt="">
        <div class="meta">
          <div>${item.title}</div>
          <small>${item.channel}</small>
        </div>
      `;
      div.onclick = () => loadVideo(i);
      container.appendChild(div);
    });
  }

  function updateActivePlaylistItem() {
    document.querySelectorAll('.playlist-item').forEach((el, i) => {
      el.classList.toggle('active', i === currentIndex);
    });
  }

  // Controls
  document.getElementById('playPause').onclick = () => {
    isPlaying? player.pauseVideo() : player.playVideo();
  };
  document.getElementById('repeat').onclick = () => {
    isLoop =!isLoop;
    document.getElementById('repeat').style.opacity = isLoop? '1' : '0.5';
  };
  document.getElementById('prev').onclick = prevVideo;
  document.getElementById('next').onclick = nextVideo;
  document.getElementById('playlistBtn').onclick = () => {
    document.getElementById('playlist').classList.toggle('show');
  };
  document.getElementById('seek').oninput = (e) => player.seekTo(e.target.value, true);

  function updateProgress() {
    if (player && player.getCurrentTime) {
      const time = player.getCurrentTime();
      document.getElementById('currentTime').textContent = formatTime(time);
      document.getElementById('seek').value = time;
    }
  }

  function formatTime(sec) {
    sec = Math.floor(sec);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }

  loadPlaylist();
</script>
</body>
</html>
